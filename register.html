<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Lunar Forge 1.0</title>
    <meta name="description"
        content="Register your team for Lunar Forge 1.0 Hackathon by Coding Ninjas Saranathan Community." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="register.css" />
</head>

<body>

    <!-- ═══════════════ PARTICLE CANVAS ═══════════════ -->
    <canvas id="particles"></canvas>

    <!-- ═══════════════ TOP BAR ═══════════════ -->
    <nav class="reg-nav">
        <a href="index.html" class="reg-back" id="back-link">← BACK</a>
        <span class="reg-nav-title">LUNAR FORGE 1.0</span>
    </nav>

    <!-- ═══════════════ REGISTRATION FORM ═══════════════ -->
    <main class="reg-main">
        <div class="reg-container" id="reg-form-container">

            <div class="reg-header">
                <span class="reg-label">REGISTRATION</span>
                <h1 class="reg-title">REGISTRATION<br />CLOSED</h1>
                <p class="reg-subtitle" style="margin-top: 16px; font-size: 1.05rem; color: var(--text-muted);">
                    Registration for Lunar Forge 1.0 has been closed. Thank you for your interest!
                </p>
                <p class="reg-subtitle" style="margin-top: 12px; font-size: 0.9rem; color: var(--text-muted);">
                    If you have already registered, you can log in to access the dashboard.
                </p>
            </div>

            <div style="display: flex; gap: 16px; justify-content: center; margin-top: 32px; flex-wrap: wrap;">
                <a href="login.html" class="submit-btn" style="text-decoration: none; text-align: center; display: inline-block; padding: 14px 32px;">
                    <span class="submit-btn-text">LOGIN →</span>
                </a>
                <a href="index.html" class="submit-btn" style="text-decoration: none; text-align: center; display: inline-block; padding: 14px 32px; background: transparent; border: 1px solid rgba(0, 212, 255, 0.3);">
                    <span class="submit-btn-text">← BACK TO HOME</span>
                </a>
            </div>

        </div>
    </main>

    <script src="register.js"></script>
</body>

</html>
