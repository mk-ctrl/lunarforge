<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Lunar Forge 1.0</title>
    <meta name="description" content="Login to your Lunar Forge 1.0 dashboard." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <!-- Reusing register.css for base layout, overriding in login.css -->
    <link rel="stylesheet" href="register.css" />
    <link rel="stylesheet" href="login.css" />
</head>

<body>

    <!-- ═══════════════ PARTICLE CANVAS ═══════════════ -->
    <canvas id="particles"></canvas>

    <!-- ═══════════════ TOP BAR ═══════════════ -->
    <nav class="reg-nav">
        <a href="index.html" class="reg-back" id="back-link">← HOME</a>
        <span class="reg-nav-title">LUNAR FORGE 1.0</span>
    </nav>

    <!-- ═══════════════ LOGIN FORM ═══════════════ -->
    <main class="reg-main login-main">
        <div class="reg-container login-container" id="login-form-container">

            <div class="reg-header login-header">
                <span class="reg-label">ACCESS YOUR DASHBOARD</span>
                <h1 class="reg-title">TEAM LOGIN</h1>
                <p class="reg-subtitle">Enter your Team ID and password to access your command center.</p>
            </div>

            <form id="login-form" autocomplete="off" novalidate>
                <div class="login-card">
                    <!-- Error Message Display -->
                    <div id="login-alert" class="login-alert" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="alert-icon">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        <span id="login-alert-msg">Invalid credentials.</span>
                    </div>

                    <div class="form-group">
                        <label for="login-team-id" class="form-label">TEAM ID <span class="required">*</span></label>
                        <input type="text" id="login-team-id" name="teamId" class="form-input login-input"
                            placeholder="e.g. CN-LF01" required />
                    </div>

                    <div class="form-group">
                        <label for="login-password" class="form-label">PASSWORD <span class="required">*</span></label>
                        <input type="password" id="login-password" name="password" class="form-input login-input"
                            placeholder="Enter 6-character password" required />
                    </div>

                    <button type="submit" class="submit-btn login-btn" id="login-btn">
                        <span class="submit-btn-text">ACCESS DASHBOARD</span>
                        <span class="submit-btn-loading" style="display:none;">VERIFYING...</span>
                    </button>
                    
                    <div class="login-footer">
                        <span class="login-footer-text" style="opacity:0.5;">Registration is now closed.</span>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script src="login.js"></script>
</body>

</html>
